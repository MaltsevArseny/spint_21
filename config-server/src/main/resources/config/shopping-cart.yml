server:
  port: 0

spring:
  application:
    name: shopping-cart
  datasource:
    url: jdbc:h2:mem:cart_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: cart
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      warehouseBreaker:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
