server:
  port: 0

spring:
  application:
    name: shopping-store
  datasource:
    url: jdbc:h2:mem:store_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: store
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
